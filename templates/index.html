<!DOCTYPE html>
<html>
<head>
    <title>Book Search Aggregator</title>
    <meta name="viewport"
            content="width=device-width, initial-scale=1">

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
        </script>

        <link rel="stylesheet" href=
            "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

        <style>
            .header, .footer, .searchbar {background-color: #112b4f; color:white}
            .classid-btn {width: 80px;}
        </style>
</head>
<body>
    <div class="sticky-top header">
        <center>
            <h1>Book Search Aggregator</h1>
            <h6 class="subheader"><i>Search for books across multiple platforms at once</i></h6>
        </center>
            <form class="input-bar" method="POST">
                <div class="input-row">
                    <div class="input-group">
                        <label>Book Title:</label>
                        <input class="form-resp" type="text" name="title" placeholder="Enter book title" required>
                    </div>
                    <div class="input-group">
                        <label>Author:</label>
                        <input class="form-resp" type="text" name="author" placeholder="Enter author name (optional)">
                    </div>
                </div>
                <button class="submit-btn"type="submit">Search</button>
            </form>
        <br>
    </div>
    <center>
    {% if results %}
        <h2 class="subheader">Results</h2>
        <table class="book-table">
            <tr>
                <th>Cover</th>
                <th>Source</th>
                <th>Title</th>
                <th>Author</th>
                <th>Link</th>
            </tr>
            {% for r in results %}
            <tr>
                <td>
                    {% if r.image %}
                    <img src="{{r.image }}" alt="Cover" width="60">
                    {% else %}
                    No Image
                    {% endif %}
                </td>
                <td>{{ r.source }}</td>
                <td>{{ r.title }}</td>
                <td>{{ r.author }}</td>
                <td><a href="{{ r.link }}" target="_blank">View</a></td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}
    </center>
    <style>
        .book-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .book-table th, .book-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .input-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .form-resp {
            width: 90%;
            padding: 8px;
            box-sizing: border-box;
            color: black;
        }

        .submit-btn {
            margin-top: 8px;
            padding: 8px 8px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>

</body>
</html>
