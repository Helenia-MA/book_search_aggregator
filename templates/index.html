<!DOCTYPE html>
<html>
<head>
    <title>Book Search Aggregator</title>
    <meta name="viewport"
            content="width=device-width, initial-scale=1">

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
        </script>

        <link rel="stylesheet" href=
            "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

        <style>
            .header, .footer, .searchbar {background-color: #112b4f; color:white}
            .classid-btn {width: 80px;}
        </style>
</head>
<body>
    <div class="sticky-top header">
        <center>
            <h1>Book Search Aggregator</h1>
            <h6 class="subheader"><i>Search for books across multiple platforms at once</i></h6>
        </center>
            <form class="input-bar" method="POST">
                <div class="input-row">
                    <div class="input-group">
                        <label>Book Title:</label>
                        <input class="form-resp" type="text" name="title" placeholder="Enter book title" required>
                    </div>
                    <div class="input-group">
                        <label>Author:</label>
                        <input class="form-resp" type="text" name="author" placeholder="Enter author name (optional)">
                    </div>
                </div>
                <button class="submit-btn"type="submit">Search</button>
            </form>
        <br>
    </div>
    <center>
    {% if results %}
        <h2 class="subheader">Results</h2>
        <table class="book-table">
            <tr>
                <th>Cover</th>
                <th>Source</th>
                <th>Title</th>
                <th>Author</th>
                <th>Link</th>
            </tr>
            {% for r in results %}
            <tr>
                <td>
                    {% if r.image %}
                    <img src="{{r.image }}" alt="Cover" width="60">
                    {% else %}
                    No Image
                    {% endif %}
                </td>
                <td>{{ r.source }}</td>
                <td>{{ r.title }}</td>
                <td>{{ r.author }}</td>
                <td><a href="{{ r.link }}" target="_blank">View</a></td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}
    </center>

</body>
</html>
